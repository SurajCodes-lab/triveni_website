<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Triveni Cabs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FFFEF5 0%, #FFF8E1 100%);
      color: #111827;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: #FACF2D;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: #111827;
    }
    p {
      font-size: 1rem;
      color: #4B5563;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #FACF2D;
      color: #111827;
      padding: 0.875rem 1.5rem;
      border-radius: 9999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .phone-link:hover { background: #E5B91A; }
    .retry-btn {
      display: block;
      margin: 1rem auto 0;
      background: transparent;
      border: 2px solid #E5B91A;
      color: #111827;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #FFF8E1; }
  </style>
</head>
<body>
  <main class="container" role="main">
    <div class="logo" aria-hidden="true">TC</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you have lost your internet connection.
      You can still reach us directly by phone for any booking needs.
    </p>
    <a href="tel:+917668570551" class="phone-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
      Call: +91 76685 70551
    </a>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
  </main>
</body>
</html>
